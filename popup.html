<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KICK Log Tool</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="klt-popup">
      <header class="klt-popup__header">
        <div>
          <h1>KICK Log Tool</h1>
          <div id="channel" class="klt-popup__channel">対象ページを確認中...</div>
          <p id="summary">検出状況を読み込み中...</p>
        </div>
        <div class="klt-popup__header-actions">
          <button id="clear" class="klt-popup__clear" type="button" disabled>
            <span class="klt-icon klt-icon--trash" aria-hidden="true"></span>
            <span class="klt-button-label">クリア</span>
          </button>
          <button id="settings-toggle" class="klt-popup__settings-toggle" type="button" aria-pressed="false">
            <span class="klt-icon klt-icon--gear" aria-hidden="true"></span>
            <span class="klt-button-label">設定</span>
          </button>
        </div>
      </header>

      <div id="main-view" class="klt-popup__view">
        <section class="klt-popup__settings klt-popup__settings--compact" aria-label="検出時の動作">
          <div class="klt-popup__setting klt-popup__setting--action">
            <div class="klt-popup__label">
              <span class="klt-icon klt-icon--bolt" aria-hidden="true"></span>
              <span>検出時の動作</span>
            </div>
            <div id="alert-action" class="klt-popup__segmented" data-alert-action="list" role="group" aria-label="リスト検出時の動作">
              <button type="button" data-action="notify">
                <span class="klt-icon klt-icon--bell" aria-hidden="true"></span>
                <span>通知</span>
              </button>
              <button type="button" data-action="temporary">
                <span class="klt-icon klt-icon--popup" aria-hidden="true"></span>
                <span>一時表示</span>
              </button>
              <button type="button" data-action="auto-pin">
                <span class="klt-icon klt-icon--pin" aria-hidden="true"></span>
                <span>自動固定</span>
              </button>
              <button type="button" data-action="off">
                <span class="klt-icon klt-icon--ban" aria-hidden="true"></span>
                <span>オフ</span>
              </button>
            </div>
          </div>
        </section>

        <section class="klt-popup__section">
          <h2>検出一覧</h2>
          <div id="list" class="klt-popup__list" aria-live="polite"></div>
        </section>
      </div>

      <section id="settings-view" class="klt-popup__settings-view" aria-label="詳細設定" hidden>
        <div class="klt-popup__settings-title">
          <h2>
            <span class="klt-icon klt-icon--sliders" aria-hidden="true"></span>
            <span>詳細設定</span>
          </h2>
          <span>対象リストと通知設定</span>
        </div>

        <div class="klt-popup__list-editor">
          <div class="klt-popup__setting" data-list-setting="broadcasterList">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--users" aria-hidden="true"></span>
                  <span>配信者</span>
                </div>
                <div class="klt-popup__hint">ログイン中のフォロー中チャンネルを自動で読み込みます。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="broadcaster-list-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <div id="broadcaster-sync-status" class="klt-popup__sync-status">読み込み状況を確認中...</div>
            <div id="broadcaster-list-items" class="klt-popup__chips"></div>
          </div>

          <div class="klt-popup__setting" data-list-setting="watchlist">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--star" aria-hidden="true"></span>
                  <span>ウォッチ</span>
                </div>
                <div class="klt-popup__hint">登録IDがコメントしたら検出します。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="watchlist-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <form id="watchlist-form" class="klt-popup__list-form">
              <input id="watchlist-input" type="text" autocomplete="off" placeholder="account_id">
              <button type="submit">
                <span class="klt-icon klt-icon--plus" aria-hidden="true"></span>
                <span>追加</span>
              </button>
            </form>
            <div id="watchlist-items" class="klt-popup__chips"></div>
          </div>

          <div class="klt-popup__setting">
            <div class="klt-popup__label">
              <span class="klt-icon klt-icon--pin" aria-hidden="true"></span>
              <span>自動固定数</span>
            </div>
            <div class="klt-popup__hint">検出時の動作が自動固定の場合に使います。</div>
            <div class="klt-popup__pin-select-row">
              <select id="max-pinned-popovers" class="klt-popup__pin-select" aria-label="自動固定する最大数">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
              <span>人まで</span>
            </div>
          </div>

          <div class="klt-popup__setting" data-list-setting="ignorelist">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--shield" aria-hidden="true"></span>
                  <span>無視</span>
                </div>
                <div class="klt-popup__hint">登録IDは自動検出・自動表示から除外します。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="ignorelist-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <form id="ignorelist-form" class="klt-popup__list-form">
              <input id="ignorelist-input" type="text" autocomplete="off" placeholder="trusted_id">
              <button type="submit">
                <span class="klt-icon klt-icon--plus" aria-hidden="true"></span>
                <span>追加</span>
              </button>
            </form>
            <div id="ignorelist-items" class="klt-popup__chips"></div>
          </div>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
