<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KICK Log Tool</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="klt-popup">
      <header class="klt-popup__header">
        <div>
          <h1>KICK Log Tool</h1>
          <div id="channel" class="klt-popup__channel">対象ページを確認中...</div>
          <div id="chat-status" class="klt-chat-status" hidden></div>
          <p id="summary">検出状況を読み込み中...</p>
        </div>
        <div class="klt-popup__header-actions">
          <button id="clear" class="klt-popup__clear" type="button" disabled>
            <span class="klt-icon klt-icon--trash" aria-hidden="true"></span>
            <span class="klt-button-label">クリア</span>
          </button>
          <button id="settings-toggle" class="klt-popup__settings-toggle" type="button" aria-pressed="false">
            <span class="klt-icon klt-icon--gear" aria-hidden="true"></span>
            <span class="klt-button-label">設定</span>
          </button>
        </div>
      </header>

      <div id="main-view" class="klt-popup__view">

        <section class="klt-popup__section">
          <div id="detection-tabs" class="klt-popup__tabs" role="tablist" aria-label="検出タブ">
            <button role="tab" id="tab-broadcaster" data-tab="broadcaster" class="klt-popup__tab is-active">
              <span class="klt-icon klt-icon--users" aria-hidden="true"></span>
              <span class="klt-tab-label">配信者</span>
              <span class="klt-tab-badge" id="badge-broadcaster" hidden></span>
            </button>
            <button role="tab" id="tab-watch" data-tab="watch" class="klt-popup__tab">
              <span class="klt-icon klt-icon--eye" aria-hidden="true"></span>
              <span class="klt-tab-label">ウォッチ</span>
              <span class="klt-tab-badge" id="badge-watch" hidden></span>
            </button>
            <button role="tab" id="tab-bot" data-tab="bot" class="klt-popup__tab">
              <span class="klt-icon klt-icon--bot" aria-hidden="true"></span>
              <span class="klt-tab-label">BOT/連投</span>
              <span class="klt-tab-badge" id="badge-bot" hidden></span>
            </button>
            <button role="tab" id="tab-other" data-tab="other" class="klt-popup__tab">
              <span class="klt-icon klt-icon--shield" aria-hidden="true"></span>
              <span class="klt-tab-label">その他</span>
              <span class="klt-tab-badge" id="badge-other" hidden></span>
            </button>
          </div>
          <div id="list" class="klt-popup__list" aria-live="polite"></div>
        </section>
      </div>

      <section id="settings-view" class="klt-popup__settings-view" aria-label="詳細設定" hidden>
        <div class="klt-popup__settings-title">
          <h2>
            <span class="klt-icon klt-icon--sliders" aria-hidden="true"></span>
            <span>詳細設定</span>
          </h2>
          <span>対象リストと通知設定</span>
        </div>

        <div class="klt-popup__list-editor">
          <section class="klt-popup__settings klt-popup__settings--compact" aria-label="検出時の動作">
            <div class="klt-popup__setting klt-popup__setting--action">
              <div class="klt-popup__label">
                <span class="klt-icon klt-icon--bolt" aria-hidden="true"></span>
                <span>検出時の動作</span>
              </div>
              <div id="alert-action" class="klt-popup__segmented" data-alert-action="list" role="group" aria-label="リスト検出時の動作">
                <button type="button" data-action="notify">
                  <span class="klt-icon klt-icon--bell" aria-hidden="true"></span>
                  <span>通知</span>
                </button>
                <button type="button" data-action="auto-pin">
                  <span class="klt-icon klt-icon--pin klt-icon--pin-tilt" aria-hidden="true"></span>
                  <span>自動ポップアップ</span>
                </button>
                <button type="button" data-action="off">
                  <span class="klt-icon klt-icon--ban" aria-hidden="true"></span>
                  <span>オフ</span>
                </button>
              </div>
            </div>

            <div class="klt-popup__setting">
              <div class="klt-popup__label">
                <span class="klt-icon klt-icon--pin klt-icon--pin-tilt" aria-hidden="true"></span>
                <span>自動ポップアップ</span>
              </div>
              <div class="klt-popup__hint">検出時の動作が自動ポップアップの場合に使います。</div>
              <div class="klt-popup__pin-select-row">
                <span class="klt-icon klt-icon--person" aria-hidden="true"></span>
                <span class="klt-popup__pin-label">最大人数</span>
                <select id="max-pinned-popovers" class="klt-popup__pin-select" aria-label="自動ポップアップする最大数">
                  <option value="0">0</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
                <span class="klt-icon klt-icon--clock" aria-hidden="true"></span>
                <span class="klt-popup__pin-label">表示時間</span>
                <select id="temporary-popup-duration" class="klt-popup__pin-select" aria-label="ポップアップ表示時間">
                  <option value="3">3秒</option>
                  <option value="4">4秒</option>
                  <option value="5">5秒</option>
                  <option value="6">6秒</option>
                  <option value="7">7秒</option>
                  <option value="8">8秒</option>
                  <option value="9">9秒</option>
                  <option value="10">10秒</option>
                </select>
              </div>
            </div>
          </section>

          <div class="klt-popup__setting" data-list-setting="compactDashboard">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--sliders" aria-hidden="true"></span>
                  <span id="compact-dashboard-label">チャット上部ダッシュボード</span>
                </div>
                <div id="compact-dashboard-hint" class="klt-popup__hint">チャット表示欄の上部に、最小限の状況メーターを表示します。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="compact-dashboard-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
          </div>

          <div class="klt-popup__setting" data-list-setting="broadcasterList">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--users" aria-hidden="true"></span>
                  <span>配信者</span>
                </div>
                <div class="klt-popup__hint">配信者のコメントを検出します。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="broadcaster-list-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <div class="klt-popup__sync-row">
              <div id="broadcaster-sync-status" class="klt-popup__sync-status">読み込み状況を確認中...</div>
              <button id="broadcaster-sync-reload" class="klt-popup__sync-reload" type="button">
                <span class="klt-icon klt-icon--refresh" aria-hidden="true"></span>
                <span>再読み込み</span>
              </button>
            </div>
            <div id="broadcaster-list-items" class="klt-popup__chips"></div>
          </div>

          <div class="klt-popup__setting" data-list-setting="botDetection">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--bot" aria-hidden="true"></span>
                  <span>BOT/連投/その他</span>
                </div>
                <div class="klt-popup__hint">不審な投稿パターンを自動検出します。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="bot-detection-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <div class="klt-popup__sensitivity-grid" aria-label="検知感度">
              <label class="klt-popup__sensitivity-field" for="bot-detection-sensitivity">
                <span>BOT/連投</span>
                <select id="bot-detection-sensitivity" class="klt-popup__sensitivity-select">
                  <option value="low">控えめ</option>
                  <option value="standard">標準</option>
                  <option value="high">強め</option>
                </select>
              </label>
              <label class="klt-popup__sensitivity-field" for="other-detection-sensitivity">
                <span>その他</span>
                <select id="other-detection-sensitivity" class="klt-popup__sensitivity-select">
                  <option value="low">控えめ</option>
                  <option value="standard">標準</option>
                  <option value="high">強め</option>
                </select>
              </label>
            </div>
            <div class="klt-popup__hint klt-popup__hint--sensitivity">検知条件の詳細は表示せず、強さだけを調整します。</div>
          </div>

          <div class="klt-popup__setting" data-list-setting="watchlist">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--eye" aria-hidden="true"></span>
                  <span>ウォッチリスト</span>
                </div>
                <div class="klt-popup__hint">登録IDがコメントしたら検出します。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="watchlist-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <form id="watchlist-form" class="klt-popup__list-form">
              <input id="watchlist-input" type="text" autocomplete="off" placeholder="account_id">
              <button type="submit">
                <span class="klt-icon klt-icon--plus" aria-hidden="true"></span>
                <span>追加</span>
              </button>
            </form>
            <div id="watchlist-items" class="klt-popup__chips"></div>
          </div>

          <div class="klt-popup__setting" data-list-setting="ignorelist">
            <div class="klt-popup__setting-header">
              <div>
                <div class="klt-popup__label">
                  <span class="klt-icon klt-icon--eye-off" aria-hidden="true"></span>
                  <span>無視</span>
                </div>
                <div class="klt-popup__hint">登録IDは自動検出・自動表示から除外します。</div>
              </div>
              <label class="klt-popup__toggle">
                <input id="ignorelist-enabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <form id="ignorelist-form" class="klt-popup__list-form">
              <input id="ignorelist-input" type="text" autocomplete="off" placeholder="trusted_id">
              <button type="submit">
                <span class="klt-icon klt-icon--plus" aria-hidden="true"></span>
                <span>追加</span>
              </button>
            </form>
            <div id="ignorelist-items" class="klt-popup__chips"></div>
          </div>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
